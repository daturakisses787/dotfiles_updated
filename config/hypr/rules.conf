# rules.conf – Hyprland Window & Layer Rules
# Syntax: windowrule (neue Hyprland-Syntax)
# Filters: match:class, match:title, match:xwayland, match:fullscreen, etc.

# ==============================================================================
# Floating Windows
# ==============================================================================

# System dialogs
windowrule = float on, match:class ^org.kde.polkit-kde-authentication-agent-1$
windowrule = float on, match:class ^polkit-gnome-authentication-agent-1$

# File dialogs
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Save File)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:class ^xdg-desktop-portal-gtk$

# System settings & tools
windowrule = float on, match:class ^nm-connection-editor$
windowrule = float on, match:class ^org.pulseaudio.pavucontrol$
windowrule = float on, match:class ^blueman-manager$
windowrule = float on, match:class ^nwg-look$
windowrule = float on, match:class ^qt5ct$
windowrule = float on, match:class ^qt6ct$
windowrule = float on, match:class ^kvantummanager$

# App-specific popups
windowrule = float on, match:title ^(.*)(Preferences)(.*)$
windowrule = float on, match:title ^(.*)(Settings)(.*)$
windowrule = float on, match:class ^file-roller$
windowrule = float on, match:class ^ark$

# Calculator, image viewer etc.
windowrule = float on, match:class ^gnome-calculator$
windowrule = float on, match:class ^qalculate-gtk$
windowrule = float on, match:class ^eog$

# Thunar file manager
windowrule = float on, match:class ^thunar$

# Floating kitty terminal (launched via SUPER+SHIFT+Return)
windowrule = float on, match:title ^kitty-float$

# ==============================================================================
# Floating Window Sizes & Centering
# ==============================================================================
windowrule = size 800 600, match:class ^xdg-desktop-portal-gtk$

windowrule = center on, match:class ^org.pulseaudio.pavucontrol$
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class ^org.pulseaudio.pavucontrol$

windowrule = center on, match:class ^blueman-manager$
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class ^blueman-manager$

windowrule = center on, match:class ^nm-connection-editor$
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class ^nm-connection-editor$

windowrule = center on, match:class ^thunar$
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class ^thunar$

windowrule = center on, match:title ^kitty-float$
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:title ^kitty-float$

# ==============================================================================
# Break Reminder Overlay
# ==============================================================================
windowrule = float on, match:class ^break-reminder$
windowrule = size 100% 100%, match:class ^break-reminder$
windowrule = move 0 0, match:class ^break-reminder$
windowrule = opacity 1.0, match:class ^break-reminder$
windowrule = no_dim on, match:class ^break-reminder$
windowrule = pin on, match:class ^break-reminder$
windowrule = border_size 0, match:class ^break-reminder$
windowrule = rounding 0, match:class ^break-reminder$

# ==============================================================================
# Workspace Assignments (silent = don't switch focus)
# ==============================================================================
windowrule = workspace 3 silent, match:class ^code-oss$
windowrule = workspace 3 silent, match:class ^Code$
windowrule = workspace 4 silent, match:class ^chromium$
windowrule = workspace 4 silent, match:initial_class ^chromium$
windowrule = workspace 5 silent, match:class ^obsidian$
windowrule = workspace 7 silent, match:class ^org.kde.kdeconnect.app$
windowrule = workspace 8 silent, match:class ^com.obsproject.Studio$
windowrule = workspace 9 silent, match:class ^Spotify$
windowrule = workspace 9 silent, match:class ^spotify$
windowrule = workspace 9 silent, match:title ^Spotify.*$
windowrule = workspace 10 silent, match:class ^thunderbird$

# ==============================================================================
# Opacity
# ==============================================================================
windowrule = opacity 0.92 0.88, match:class ^kitty$
windowrule = opacity 0.95 0.90, match:class ^code-oss$
windowrule = opacity 0.95 0.90, match:class ^Code$

# ==============================================================================
# No Dim for Full Screen
# ==============================================================================
windowrule = no_dim on, match:fullscreen 1

# ==============================================================================
# Prevent maximize event for certain apps
# ==============================================================================
windowrule = suppress_event maximize, match:class ^chromium$

# ==============================================================================
# Fix XWayland apps
# ==============================================================================
windowrule = rounding 0, match:xwayland true
windowrule = no_shadow on, match:xwayland true

# ==============================================================================
# Layer Rules (blur on waybar/wofi/notifications)
# ==============================================================================
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0, match:namespace wofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
