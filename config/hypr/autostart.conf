# autostart.conf – Programs launched on Hyprland startup

# ==============================================================================
# Wallpaper Daemon
# ==============================================================================
exec-once = swww-daemon
exec-once = ~/.local/bin/wallpaper.sh --once

# ==============================================================================
# Status Bar
# ==============================================================================
exec-once = waybar

# ==============================================================================
# Notification Daemon
# ==============================================================================
exec-once = dunst

# ==============================================================================
# Clipboard Manager
# ==============================================================================
# Watch clipboard and store text + images in cliphist database
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ==============================================================================
# Polkit Authentication Agent
# ==============================================================================
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ==============================================================================
# Idle Daemon
# ==============================================================================
exec-once = bash -c '[[ "$(cat "${XDG_CACHE_HOME:-$HOME/.cache}/caffeine-mode" 2>/dev/null)" != "on" ]] && hypridle'

# ==============================================================================
# XDG Desktop Portal
# ==============================================================================
# Required for screen sharing, file picker etc.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland

# ==============================================================================
# SSH Agent – load key on session start
# ==============================================================================
exec-once = ssh-add ~/.ssh/id_ed25519

# ==============================================================================
# Network Manager Applet (tray icon)
# ==============================================================================
exec-once = nm-applet --indicator

# ==============================================================================
# Bluetooth Manager (tray icon)
# ==============================================================================
exec-once = blueman-applet

# ==============================================================================
# User Applications (workspace assignments via windowrule2 in rules.conf)
# ==============================================================================
exec-once = [workspace 3 silent] code
exec-once = bash -c "sleep 3 && chromium --new-window"
exec-once = [workspace 5 silent] obsidian
exec-once = [workspace 7 silent] kdeconnect-app
exec-once = [workspace 8 silent] obs
exec-once = ~/.local/bin/mc-audio-obs watch
exec-once = [workspace 9 silent] spotify-launcher
exec-once = [workspace 10 silent] thunderbird
