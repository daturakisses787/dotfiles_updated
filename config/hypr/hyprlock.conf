# hyprlock.conf – Lockscreen Configuration
# Catppuccin Mocha (dark) theme

general {
    hide_cursor = true
    ignore_empty_input = true
}

# ==============================================================================
# Background
# ==============================================================================
background {
    monitor =
    # Use current wallpaper symlink (updated by wallpaper.sh)
    path = $HOME/.cache/current-wallpaper
    # Fallback color if no wallpaper is set
    color = rgba(30, 30, 46, 1.0)

    blur_size = 8
    blur_passes = 3
    brightness = 0.5
    contrast = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ==============================================================================
# Clock (large, centered upper half)
# ==============================================================================
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(205, 214, 244, 1.0)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ==============================================================================
# Date
# ==============================================================================
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d. %B %Y')"
    color = rgba(205, 214, 244, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.4)
}

# ==============================================================================
# Username
# ==============================================================================
label {
    monitor =
    text = 󰤶  $USER
    color = rgba(137, 180, 250, 0.9)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# ==============================================================================
# Password Input Field
# ==============================================================================
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgb(137, 180, 250)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    font_family = JetBrainsMono Nerd Font

    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>󰌋  Enter Password...</i>
    hide_input = false

    rounding = 14
    check_color = rgb(166, 227, 161)
    fail_color = rgb(243, 139, 168)
    fail_text = <i>󰟐  $FAIL <b>($ATTEMPTS)</b></i>

    capslock_color = rgb(249, 226, 175)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -120
    halign = center
    valign = center
}
