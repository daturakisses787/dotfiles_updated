# animations.conf – Hyprland Animation Configuration
# Smooth anime-aesthetic animations with overshot bezier curves

animations {
    enabled = true

    # ==============================================================================
    # Bezier Curves
    # ==============================================================================

    # Overshot: elastic bounce effect for windows (anime-style)
    bezier = overshot,    0.05, 0.9, 0.1, 1.1
    bezier = overshoot,   0.13, 0.99, 0.29, 1.1

    # Smooth transitions
    bezier = smoothIn,    0.25, 1.0, 0.5, 1.0
    bezier = smoothOut,   0.5,  0.0, 0.5, 1.0
    bezier = smoothInOut, 0.4,  0.0, 0.2, 1.0

    # Linear (for borders, color animations)
    bezier = linear,      0.0,  0.0, 1.0, 1.0

    # ==============================================================================
    # Window Animations
    # ==============================================================================

    # Opening windows: slide in with overshot bounce
    animation = windows,     1, 5,  overshot,  slide

    # Closing windows: quick smooth fade-out
    animation = windowsOut,  1, 4,  smoothOut, slide

    # Moving windows: smooth follow
    animation = windowsMove, 1, 4,  smoothIn

    # ==============================================================================
    # Border & Color Animations
    # ==============================================================================

    # Animated gradient border angle (creates rainbow-like sweep)
    animation = border,      1, 10, linear
    animation = borderangle, 1, 40, linear, loop

    # ==============================================================================
    # Fade Animations
    # ==============================================================================
    animation = fade,        1, 5,  smoothIn
    animation = fadeIn,      1, 5,  smoothIn
    animation = fadeOut,     1, 4,  smoothOut
    animation = fadeDim,     1, 5,  smoothInOut

    # ==============================================================================
    # Workspace Animations
    # ==============================================================================

    # Horizontal slide with overshot for workspace switching
    animation = workspaces,       1, 6, overshot, slidevert

    # Special workspace (scratchpad): vertical slide
    animation = specialWorkspace, 1, 6, overshot, slide
}
