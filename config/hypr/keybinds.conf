# keybinds.conf – Hyprland Key Bindings
# Main modifier: SUPER (Windows key)

$mod = SUPER
$scripts = ~/.local/bin

# ==============================================================================
# Applications
# ==============================================================================
bind = $mod, Return, exec, kitty
bind = $mod SHIFT, Return, exec, kitty --title "kitty-float"
bind = $mod, Q, killactive
bind = $mod, Space, exec, wofi --show drun
bind = $mod, E, exec, thunar
bind = $mod, B, exec, chromium
bind = $mod, C, exec, code
bind = $mod, O, exec, obsidian

# ==============================================================================
# Lockscreen (SUPER+L – no movefocus conflict)
# ==============================================================================
bind = $mod, L, exec, hyprlock

# ==============================================================================
# Window Management
# ==============================================================================
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod, S, togglesplit

# ==============================================================================
# Focus Navigation (Arrow Keys)
# ==============================================================================
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ==============================================================================
# Move Windows (vim-style H/J/K/L)
# ==============================================================================
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# ==============================================================================
# Resize Windows
# ==============================================================================
binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, up,    resizeactive, 0 -30
binde = $mod CTRL, down,  resizeactive, 0 30

# ==============================================================================
# Workspaces 1-9 and 10 (via 0)
# ==============================================================================
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ==============================================================================
# Workspace Navigation (scroll / special)
# ==============================================================================
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod CTRL, right, workspace, e+1
bind = $mod CTRL, left,  workspace, e-1

# Special workspace (scratchpad)
bind = $mod, minus,       togglespecialworkspace, magic
bind = $mod SHIFT, minus, movetoworkspace, special:magic

# ==============================================================================
# Screenshot
# ==============================================================================
bind = $mod,       P, exec, $scripts/screenshot.sh area
bind = $mod SHIFT, P, exec, $scripts/screenshot.sh screen

# ==============================================================================
# Clipboard (cliphist via wofi)
# ==============================================================================
bind = $mod, V, exec, cliphist list | wofi --dmenu --prompt "Clipboard" | cliphist decode | wl-copy

# ==============================================================================
# Theme & Power
# ==============================================================================
#bind = $mod,       T, exec, $scripts/theme-toggle.sh
bind = $mod,       W, exec, $scripts/wallpaper-picker.sh
bind = $mod SHIFT, W, exec, $scripts/wallpaper.sh --once
bind = $mod SHIFT, C, exec, $scripts/caffeine.sh toggle
bind = CTRL ALT, DELETE, exec, $scripts/power-menu.sh

# ==============================================================================
# Media Keys
# ==============================================================================
bindel = , XF86AudioRaiseVolume,  exec, $scripts/volume.sh up
bindel = , XF86AudioLowerVolume,  exec, $scripts/volume.sh down
bind   = , XF86AudioMute,         exec, $scripts/volume.sh mute
bind   = , XF86AudioPlay,         exec, playerctl play-pause
bind   = , XF86AudioNext,         exec, playerctl next
bind   = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, $scripts/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, $scripts/brightness.sh down

# ==============================================================================
# Mouse Bindings
# ==============================================================================
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ==============================================================================
# Timestamp / Recording Markers
# ==============================================================================
bind = $mod,       M, exec, $scripts/timestamp.sh marker
bind = $mod,       N, exec, $scripts/timestamp.sh note
bind = $mod SHIFT, M, exec, $scripts/timestamp.sh end

# ==============================================================================
# OBS Studio
# ==============================================================================
bind = $mod, F2, exec, $scripts/obs-record.sh

# ==============================================================================
# Voice-to-Text (Speech Recognition)
# ==============================================================================
bind = $mod, F3, exec, $scripts/voice-to-text.sh

# ==============================================================================
# Hyprland Control
# ==============================================================================
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exec, hyprctl dispatch exit
