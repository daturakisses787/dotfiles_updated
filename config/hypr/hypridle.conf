# hypridle.conf – Idle Daemon Configuration
# Automatic screen dimming, locking and suspension

general {
    lock_cmd = pidof hyprlock || hyprlock  # Only lock if not already locked
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# ==============================================================================
# Timeouts (in seconds)
# ==============================================================================

# 3 minutes: Dim screen to 20%
listener {
    timeout = 180
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# 4 minutes: Lock screen
listener {
    timeout = 240
    on-timeout = loginctl lock-session
}

# 5 minutes: Turn off display
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 30 minutes: Suspend system
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
