# hyprland.conf – Main Hyprland Configuration
# Sources all module files for a clean, modular setup

# Theme variables (dark by default, managed by theme-toggle.sh)
source = ~/.config/hypr/theme.conf

# ==============================================================================
# Environment (NVIDIA Wayland)
# ==============================================================================
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ==============================================================================
# Environment (XDG)
# ==============================================================================
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:$HOME/.local/share

# ==============================================================================
# Environment (Qt/Wayland)
# ==============================================================================
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# ==============================================================================
# Environment (Cursor)
# ==============================================================================
env = XCURSOR_THEME,Bibata-Original-Classic
env = XCURSOR_SIZE,24

# Module configs
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/autostart.conf

# ==============================================================================
# Monitor Configuration
# ==============================================================================
# Format: monitor=name,resolution,position,scale
# Use 'hyprctl monitors' to list available monitors
monitor = DP-1, preferred, 0x0, 1
monitor = DP-3, preferred, auto-right, 1

# Fallback for any additional monitors
monitor = , preferred, auto, 1

# ==============================================================================
# Workspace → Monitor Bindings
# ==============================================================================
# Workspaces 1–4 always on left monitor (DP-1)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
# Workspaces 5–10 always on right monitor (DP-3)
workspace = 5, monitor:DP-3, default:true
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3
workspace = 10, monitor:DP-3

# ==============================================================================
# General Settings
# ==============================================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Colors from theme.conf
    col.active_border = $accent_primary $accent_secondary 45deg
    col.inactive_border = $surface_border

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ==============================================================================
# Input
# ==============================================================================
input {
    kb_layout = eu
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# ==============================================================================
# Dwindle Layout
# ==============================================================================
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

# ==============================================================================
# Master Layout (alternative)
# ==============================================================================
master {
    new_status = master
    mfact = 0.55
}

# ==============================================================================
# Decoration
# ==============================================================================
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = $shadow_color
    }

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
}

# ==============================================================================
# Gestures
# ==============================================================================
gestures {
    # workspace_swipe and workspace_swipe_fingers removed in Hyprland 0.46+
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
}

# ==============================================================================
# Misc
# ==============================================================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    vrr = 0
    focus_on_activate = false
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

# ==============================================================================
# XWayland
# ==============================================================================
xwayland {
    use_nearest_neighbor = false
    force_zero_scaling = false
}
