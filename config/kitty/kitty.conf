# kitty.conf – Kitty Terminal Configuration
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# ==============================================================================
# Font
# ==============================================================================
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# Disable ligatures (optional – set to cursor to only show at cursor)
disable_ligatures never

# ==============================================================================
# Window
# ==============================================================================
window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0

# Resize behavior
resize_in_steps yes
initial_window_width  960
initial_window_height 600

# ==============================================================================
# Scrollback
# ==============================================================================
scrollback_lines 10000
scrollback_pager_history_size 0

# ==============================================================================
# Performance
# ==============================================================================
repaint_delay 8
input_delay 3
sync_to_monitor yes

# ==============================================================================
# Bell
# ==============================================================================
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

# ==============================================================================
# Tab Bar
# ==============================================================================
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"
active_tab_font_style bold
inactive_tab_font_style normal

# ==============================================================================
# Cursor
# ==============================================================================
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 5.0

# ==============================================================================
# URL Handling
# ==============================================================================
detect_urls yes
open_url_with chromium
url_style curly

# ==============================================================================
# Clipboard
# ==============================================================================
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# ==============================================================================
# Theme (active.conf is a symlink managed by theme-toggle.sh)
# ==============================================================================
include themes/active.conf

# ==============================================================================
# Key Mappings
# ==============================================================================
# Clear all defaults first for clean mappings
clear_all_shortcuts no

# Clipboard
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard

# Tab management
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+tab     next_tab
map ctrl+shift+tab previous_tab

# Window management (within kitty)
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+q     close_window
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window

# Font size
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# Scrollback
map ctrl+shift+up    scroll_line_up
map ctrl+shift+down  scroll_line_down
map ctrl+shift+k     scroll_line_up
map ctrl+shift+j     scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home  scroll_home
map ctrl+shift+end   scroll_end

# Open URL under cursor
map ctrl+shift+e open_url_with_hints
