#? Config file for btop version: 1.3.0

# Color theme: catppuccin-mocha
color_theme = "catppuccin_mocha"

# If the theme set background color
theme_background = True

# Enable true color (24-bit)
truecolor = True

# If a tty is detected, force TTY mode
force_tty = False

# Default graph symbol
# Possible values: braille, block, tty
graph_symbol = "braille"

# Graph symbol override per section
graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

# Default layout: cpu mem net proc
shown_boxes = "cpu mem net proc"

# Update interval in milliseconds
update_ms = 1000

# Processes sorting
# Possible: pid, program, arguments, threads, user, memory, cpu direct, cpu lazy
proc_sorting = "cpu lazy"

# Reverse process sorting
proc_reversed = False

# Show processes as tree
proc_tree = False

# Use per-core cpu stats in process list
proc_per_core = True

# Show process memory as bytes instead of percentage
proc_mem_bytes = True

# Show cpu graph per-core or combined
cpu_graph_upper_color = "blue"
cpu_graph_lower_color = "green"
cpu_invert_lower = True
cpu_single_graph = False

# Show cpu bottom bar
cpu_bottom = False

# Show memory graphs
mem_graphs = True

# Show memory available instead of used
mem_show_disks = True

# Disk filter (comma-separated, 'exclude' to filter, 'include' to only show)
disk_filter = ""

# Network download/upload speed limits (e.g. "1000 Mbit")
net_download = "1000 Mbit"
net_upload = "1000 Mbit"
net_auto = True
net_sync = True
net_iface = ""

# Show battery stats
show_battery = True
selected_battery = "Auto"
show_battery_watts = True

# Clock format (see man strftime for format codes)
clock_format = "%X"

# Temp scale: celsius, fahrenheit, kelvin, rankine
temp_scale = "celsius"

# Show GPU information
show_gpu_info = "Auto"

# Log level: ERROR, WARNING, INFO, DEBUG
log_level = "WARNING"

# Enabled gpus
gpu_mirror_graph = True
custom_gpu_name0 = ""
custom_gpu_name1 = ""
custom_gpu_name2 = ""
custom_gpu_name3 = ""
custom_gpu_name4 = ""
custom_gpu_name5 = ""
